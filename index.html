i<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Official portfolio of Arvind Singh – Parshad, Ward No. 1 (Mahadev Jharkhandi Tukda No-1), Gorakhpur. See completed works, ongoing projects, future plans, and how to report issues." />
  <title>Arvind Singh – Parshad, Ward No. 1, Gorakhpur</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
</head>
<body>

  <!--
    ====================================================================
    SHELL FILE — All page content is split into /sections/*.html files.
    The loader in js/loader.js fetches each section below and injects it
    into its matching placeholder. To edit any section of the site, open
    the corresponding file in /sections/ — do NOT edit this shell file
    for content changes.

    Edit the menu? → sections/header.html
    Edit the hero? → sections/hero.html
    Add an achievement? → sections/achievements.html
    Add a project? → sections/ongoing.html
    ...and so on.
    ====================================================================
  -->

  <div data-section="header"></div>

  <main>
    <div data-section="hero"></div>
    <div data-section="impact-strip"></div>
    <div data-section="about"></div>
    <div data-section="achievements"></div>
    <div data-section="ongoing"></div>
    <div data-section="vision"></div>
    <div data-section="queries"></div>
    <div data-section="trust"></div>
    <div data-section="message"></div>
    <div data-section="contact"></div>
  </main>

  <div data-section="footer"></div>

  <!-- Global UI elements (not part of any section) -->
  <a href="#top" class="back-to-top" id="backToTop" aria-label="Back to top">&#8679;</a>

  <!-- Google Translate (English ↔ Hindi).
       Sections are injected async by loader.js, so the mount div
       inside sections/header.html may not exist when the library
       loads. We poll briefly until it's in the DOM. -->
  <script>
    let __gtLibReady = false;
    function googleTranslateElementInit() {
      __gtLibReady = true;
      __tryInitTranslate();
    }
    function __tryInitTranslate() {
      if (!__gtLibReady) return;
      const el = document.getElementById('google_translate_element');
      if (!el) { setTimeout(__tryInitTranslate, 100); return; }
      if (el.dataset.gtInit) return;
      el.dataset.gtInit = '1';
      // Default layout renders a native <select class="goog-te-combo"> —
      // that's what the CSS in style.css is styling. Do NOT pass
      // InlineLayout.SIMPLE here; it produces a different widget.
      new google.translate.TranslateElement({
        pageLanguage: 'en',
        includedLanguages: 'en,hi',
        autoDisplay: false
      }, 'google_translate_element');
    }
  </script>
  <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

  <!-- Loader: fetches all sections, then boots main.js -->
  <script src="js/loader.js"></script>
</body>
</html>
